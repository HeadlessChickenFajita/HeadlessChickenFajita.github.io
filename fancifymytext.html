<!DOCTYPE html>
<html>
	<head>
		<title>Fancify Shamcify</title>
		
	</head>

	<body>
		<h1>Fancify my Text</h1>
		<fieldset>
			<legend>Text</legend>
			<label for="userText">Enter your text:
				<textarea id="userText" name="userText" rows="4" cols="30"></textarea>
			</label>
		</fieldset>
		
		<fieldset>
			<legend>Fancify</legend>
			<button type="button" id="biggerBtn" onclick="makeTextBigger();">Bigger!</button>
			<button type="button" id="mooBtn" onclick="handleMoo();">Moo</button>
			<div>
				<input type="radio" id="fancyShmancy" name="fancifyStyle" value="fancy" onchange="fancifyChange();">
				<label for="fancyShmancy">FancyShmancy</label>
				<input type="radio" id="boringBetty" name="fancifyStyle" value="boring" onchange="fancifyChange();">
				<label for="boringBetty">BoringBetty</label>
			</div>
		</fieldset>
		
		<script src="fancifymytext.js"></script>
	</body>
</html>
